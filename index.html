<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RJ Luxe - Collectie</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --mouse-x: 50vw;
            --mouse-y: 50vh;
            --accent: #c77dff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Playfair Display', serif;
            background-color: #08020b; 
            color: #ece4f2;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #08020b; }
        ::-webkit-scrollbar-thumb { background: rgba(199, 125, 255, 0.4); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(199, 125, 255, 0.8); }

        /* =========================================
           1. LIVE VIDEO LOOP (DIAMANTEN) 💎
           ========================================= */
        .video-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2; overflow: hidden; background-color: #000;
        }
        .video-bg video {
            width: 100%; height: 100%; object-fit: cover;
            filter: brightness(0.4) contrast(1.4) saturate(0.8);
        }
        .video-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(180deg, rgba(8,2,11,0.3) 0%, rgba(8,2,11,0.95) 100%);
            z-index: -1; pointer-events: none;
        }

        /* =========================================
           2. Y2K FILM GRAIN / RUIS OVERLAY 🎥
           ========================================= */
        .film-grain {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9000; opacity: 0.06;
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noise"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noise)"/%3E%3C/svg%3E');
            animation: grain-dance 0.2s infinite steps(1);
        }
        @keyframes grain-dance {
            0%, 100% { background-position: 0 0; }
            25% { background-position: 5px 10px; }
            50% { background-position: -10px -5px; }
            75% { background-position: 10px -15px; }
        }

        /* PRELOADER */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #050108; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.8s ease-out, visibility 0.8s ease-out;
        }
        #preloader.hidden { opacity: 0; visibility: hidden; }

        .preloader-logo {
            font-family: 'Great Vibes', cursive; font-size: 6rem;
            color: transparent; -webkit-text-stroke: 2px #d09cf5;
            text-shadow: 0 0 20px #c77dff, 0 0 40px #9d4edd;
            animation: pulse-glow 1.5s infinite alternate ease-in-out;
        }
        @keyframes pulse-glow {
            0% { transform: scale(0.9); opacity: 0.7; text-shadow: 0 0 10px #c77dff; }
            100% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 30px #c77dff, 0 0 60px #9d4edd; }
        }

        /* WATERMERK & LOGO */
        .spotlight {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 0;
            background: radial-gradient(800px circle at var(--mouse-x) var(--mouse-y), rgba(176, 82, 255, 0.15) 0%, rgba(74, 20, 140, 0.05) 40%, transparent 80%);
        }

        .watermark-container {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 1; pointer-events: none; display: flex; justify-content: center;
            align-items: center; width: 100vw; opacity: 0.95; 
            filter: drop-shadow(1px 1px 0px #9d4edd) drop-shadow(3px 3px 0px #7b2cbf) drop-shadow(5px 5px 0px #5a189a) drop-shadow(7px 7px 0px #3c096c) drop-shadow(0px 15px 30px rgba(0,0,0,0.9));
        }

        .logo-wrapper { 
            position: relative; display: inline-block; 
            filter: drop-shadow(0 0 8px rgba(224, 170, 255, 0.4)) drop-shadow(0 0 15px rgba(199, 125, 255, 0.2)); 
        }

        .logo-text {
            font-family: 'Great Vibes', cursive; font-size: 35vw; line-height: 1.4; 
            padding: 10vw 15vw; margin: -10vw -15vw; letter-spacing: -3vw; 
            -webkit-text-stroke: 3px #d09cf5; 
            background: linear-gradient(115deg, transparent 45%, rgba(255,255,255,0.9) 50%, transparent 55%), conic-gradient(from 45deg at 50% 50%, rgba(255,255,255,0.9) 0deg, rgba(200,210,220,0.3) 45deg, rgba(255,255,255,0.8) 90deg, rgba(180,195,210,0.5) 135deg, rgba(255,255,255,0.9) 180deg, rgba(200,210,220,0.3) 225deg, rgba(255,255,255,0.8) 270deg, rgba(180,195,210,0.5) 315deg), conic-gradient(from 15deg at 25% 25%, #ffffff 0deg, #c4d4db 90deg, #ffffff 180deg, #8ba8b5 270deg), linear-gradient(135deg, #e0eff2 0%, #ffffff 30%, #b8ced1 50%, #ffffff 70%, #e0eff2 100%);
            background-size: 200% 100%, 14px 14px, 22px 22px, 100% 100%; background-position: -200% 0, 0 0, 0 0, 0 0; 
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent;
            animation: occasional-reflection 8s infinite ease-in-out;
        }

        .sparkle {
            position: absolute; width: 40px; height: 40px;
            background: radial-gradient(circle, #ffffff 20%, transparent 60%);
            clip-path: polygon(50% 0%, 55% 45%, 100% 50%, 55% 55%, 50% 100%, 45% 55%, 0% 50%, 45% 45%);
            opacity: 0; z-index: 10;
        }
        .s1 { top: 30%; left: 15%; animation: occasional-sparkle 5s infinite 1s; }
        .s2 { top: 60%; right: 10%; animation: occasional-sparkle 7s infinite 3s; transform: scale(1.2); }
        .s3 { bottom: 25%; left: 40%; animation: occasional-sparkle 6s infinite 5s; transform: scale(0.8); }
        .s4 { top: 45%; right: 40%; animation: occasional-sparkle 9s infinite 4s; transform: scale(1.3); }
        @keyframes occasional-sparkle { 0%, 92%, 100% { opacity: 0; transform: scale(0.2) rotate(0deg); } 96% { opacity: 1; transform: scale(1.5) rotate(90deg); filter: drop-shadow(0 0 15px white); } }
        @keyframes occasional-reflection { 0%, 80% { background-position: -200% 0, 0 0, 0 0, 0 0; } 90% { background-position: 200% 0, 0 0, 0 0, 0 0; } 100% { background-position: 200% 0, 0 0, 0 0, 0 0; } }

        /* HERO & SHOP */
        .hero { height: 100vh; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; z-index: 10; }
        .hero h1 { font-family: 'Cinzel', serif; font-size: 3.5rem; letter-spacing: 12px; text-transform: uppercase; font-weight: 600; opacity: 0.95; text-shadow: 0 5px 15px rgba(0,0,0,0.9); margin-bottom: 60px; }
        .scroll-indicator { display: flex; flex-direction: column; align-items: center; color: var(--accent); font-size: 0.85rem; letter-spacing: 3px; text-transform: uppercase; opacity: 0.8; animation: pulse 2s infinite ease-in-out; position: absolute; bottom: 50px; }
        .scroll-line { width: 1px; height: 50px; background-color: var(--accent); margin-top: 15px; }
        @keyframes pulse { 0% { opacity: 0.4; transform: translateY(0); } 50% { opacity: 1; transform: translateY(8px); } 100% { opacity: 0.4; transform: translateY(0); } }

        .products { padding: 100px 50px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 10; perspective: 1000px; }
        .products h2 { font-family: 'Cinzel', serif; text-align: center; font-size: 2.2rem; letter-spacing: 5px; margin-bottom: 30px; color: #ffffff; font-weight: 400; text-transform: uppercase; }

        .search-container { text-align: center; margin-bottom: 50px; }
        #searchInput { width: 80%; max-width: 400px; padding: 12px 25px; font-family: 'Cinzel', serif; font-size: 1rem; color: #ffffff; background: rgba(20, 8, 30, 0.6); border: 1px solid rgba(199, 125, 255, 0.3); border-radius: 25px; outline: none; transition: all 0.3s ease; backdrop-filter: blur(5px); }
        #searchInput:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(199, 125, 255, 0.3); background: rgba(20, 8, 30, 0.9); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        
        /* =========================================
           3. DYNAMISCH 3D KAART & LIGHT-BEAM EFFECT ⚡
           ========================================= */
        .product-card { 
            position: relative; 
            border-radius: 8px; 
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center; 
            font-family: 'Cinzel', serif; letter-spacing: 2px; color: #a37bc7; 
            padding: 20px; text-align: center; height: 100%;
            transform-style: preserve-3d;
            will-change: transform;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.6s ease;
        }

        /* De laser-straal wrapper (verborgen buiten de randjes) */
        .beam-wrapper {
            position: absolute; inset: 0;
            border-radius: 8px; overflow: hidden; z-index: 0;
            box-shadow: inset 0 0 0 1px rgba(199, 125, 255, 0.15);
            transition: box-shadow 0.3s ease;
        }

        /* De draaiende laser-straal */
        .beam {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, rgba(199, 125, 255, 0.1), var(--accent));
            animation: rotate-beam 5s linear infinite;
            opacity: 0.5; transition: opacity 0.3s ease;
        }

        /* Het donkere binnenste van de kaart dat de straal bedekt, behalve 1px rand */
        .beam-inner {
            position: absolute; inset: 1px;
            background: rgba(13, 4, 18, 0.85); backdrop-filter: blur(8px);
            border-radius: 7px; z-index: 1;
        }

        /* Muis over de kaart: Licht versnelt en glanst! */
        .product-card:hover .beam { 
            animation-duration: 1.5s; 
            opacity: 1; 
            background: conic-gradient(transparent, transparent, rgba(199, 125, 255, 0.4), #fff);
        }
        .product-card:hover .beam-wrapper {
            box-shadow: 0 0 25px rgba(199, 125, 255, 0.3);
        }

        @keyframes rotate-beam {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Zorg dat de 3D content BOVEN de laser staat */
        .product-badge, .img-container, .product-title, .product-price, .button-group {
            position: relative; z-index: 2;
        }

        /* 3D elementen */
        .product-badge {
            position: absolute; top: 15px; left: 15px; background: rgba(8, 2, 11, 0.9); border: 1px solid var(--accent);
            color: #ffffff; font-size: 0.7rem; font-weight: 600; padding: 6px 12px; letter-spacing: 2px;
            border-radius: 3px; text-transform: uppercase; box-shadow: 0 0 10px rgba(199, 125, 255, 0.2);
            transform: translateZ(40px);
        }

        .product-card.is-sold-out .product-image { filter: grayscale(100%) opacity(0.4); }
        .product-card.is-sold-out .product-badge.sold-out { border-color: #ff4d4d; color: #ff4d4d; box-shadow: 0 0 10px rgba(255, 77, 77, 0.3); }

        .img-container { width: 100%; height: 260px; border-radius: 6px; overflow: hidden; margin-bottom: 20px; background-color: #1a0b26; transform: translateZ(30px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .product-image { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        .product-card:not(.is-sold-out):hover .product-image { transform: scale(1.08); }

        .product-title { margin-bottom: 15px; font-weight: 600; font-size: 1.2rem; transform: translateZ(25px); }
        .product-price { color: #ffffff; font-size: 1.1rem; margin-bottom: 25px; letter-spacing: 1px; transform: translateZ(20px); }
        
        .button-group { display: flex; gap: 10px; width: 100%; margin-top: auto; transform: translateZ(35px); }
        .btn-details, .btn-add { flex: 1; font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; padding: 12px 5px; border-radius: 4px; border: 1px solid var(--accent); }
        .btn-details { background-color: transparent; color: var(--accent); }
        .btn-details:hover { background-color: rgba(199, 125, 255, 0.2); color: #fff; }
        
        .btn-add { background-color: var(--accent); color: #08020b; font-weight: bold; }
        .btn-add:hover { box-shadow: 0 0 20px rgba(199, 125, 255, 0.6); transform: scale(1.05); }
        .btn-add.disabled { background-color: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: rgba(255, 255, 255, 0.3) !important; cursor: not-allowed !important; box-shadow: none !important; pointer-events: none; }

        /* WINKELMAND */
        #cartIcon {
            position: fixed; bottom: 30px; right: 30px; background: var(--accent); color: #08020b;
            width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 1.6rem; cursor: pointer; z-index: 9500; box-shadow: 0 5px 25px rgba(199, 125, 255, 0.5); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #cartIcon:hover { transform: scale(1.15) rotate(5deg); }
        #cartCount {
            position: absolute; top: -5px; right: -5px; background: #fff; color: #000; font-family: sans-serif;
            font-size: 0.85rem; width: 24px; height: 24px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; border: 2px solid #08020b;
        }

        #cartOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px);
            z-index: 9600; opacity: 0; visibility: hidden; transition: all 0.4s ease;
        }
        #cartOverlay.active { opacity: 1; visibility: visible; }

        #cartSidebar {
            position: fixed; top: 0; right: -420px; width: 420px; max-width: 100vw; height: 100vh;
            background: rgba(13, 4, 18, 0.95); backdrop-filter: blur(25px); z-index: 9700;
            transition: right 0.4s cubic-bezier(0.25, 1, 0.5, 1); border-left: 1px solid rgba(199, 125, 255, 0.3);
            display: flex; flex-direction: column; font-family: 'Cinzel', serif; box-shadow: -10px 0 50px rgba(0,0,0,0.9);
        }
        #cartSidebar.active { right: 0; }
        .cart-header { padding: 30px; border-bottom: 1px solid rgba(199, 125, 255, 0.15); display: flex; justify-content: space-between; align-items: center; }
        .cart-header h3 { color: #fff; letter-spacing: 3px; margin: 0; font-weight: 600; text-transform: uppercase; }
        .close-cart { font-size: 2.2rem; cursor: pointer; color: rgba(255,255,255,0.5); transition: 0.3s; line-height: 1; font-family: sans-serif; }
        .close-cart:hover { color: #fff; transform: scale(1.1); }
        
        #cartItems { flex: 1; overflow-y: auto; padding: 20px 30px; color: #fff; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 15px; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(199, 125, 255, 0.15); border-radius: 8px; padding: 15px; font-size: 0.9rem; align-items: center; letter-spacing: 1px; transition: 0.3s; }
        .cart-item:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(199, 125, 255, 0.4); }
        .item-name { flex: 1; padding-right: 10px; }
        .remove-item { color: #ff4d4d; cursor: pointer; margin-left: 15px; font-family: sans-serif; font-size: 1.1rem; padding: 5px; transition: 0.2s; }
        .remove-item:hover { transform: scale(1.2); }
        
        .cart-footer { padding: 30px; border-top: 1px solid rgba(199, 125, 255, 0.15); background: rgba(8, 2, 11, 0.9); }
        .cart-total { font-size: 1.3rem; margin-bottom: 25px; display: flex; justify-content: space-between; font-weight: bold; color: #fff; letter-spacing: 2px;}
        .btn-checkout { width: 100%; background: linear-gradient(135deg, var(--accent) 0%, #7b2cbf 100%); color: #fff; padding: 18px; border: 1px solid #c77dff; font-weight: 600; font-size: 1rem; border-radius: 5px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; font-family: 'Cinzel', serif; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .btn-checkout:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(199, 125, 255, 0.6); }

        @media (max-width: 768px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .product-card { padding: 15px; }
            .img-container { height: 160px; margin-bottom: 10px; }
            .product-title { font-size: 0.8rem; margin-bottom: 5px; letter-spacing: 1px; }
            .product-price { font-size: 0.9rem; margin-bottom: 15px; }
            .button-group { flex-direction: column; gap: 8px; }
            .btn-details, .btn-add { font-size: 0.7rem; padding: 10px 5px; }
            .products { padding: 50px 20px; }
            #searchInput { width: 90%; }
            .hero h1 { font-size: 2.5rem; }
            .product-badge { top: 10px; left: 10px; font-size: 0.55rem; padding: 4px 8px; }
        }
    </style>
</head>
<body>

    <!-- Y2K FILM GRAIN OVERLAY -->
    <div class="film-grain"></div>

    <!-- DIAMOND VIDEO LOOP -->
    <div class="video-bg">
        <video autoplay loop muted playsinline>
            <source src="https://cdn.pixabay.com/video/2021/08/11/84687-586757134_large.mp4" type="video/mp4">
        </video>
    </div>
    <div class="video-overlay"></div>

    <div id="preloader"><div class="preloader-logo">RJ</div></div>
    <div id="cartIcon" onclick="toggleCart()">🛒 <span id="cartCount">0</span></div>
    
    <div id="cartOverlay" onclick="toggleCart()"></div>
    <div id="cartSidebar">
        <div class="cart-header">
            <h3>Winkelmand</h3>
            <span class="close-cart" onclick="toggleCart()">✕</span>
        </div>
        <div id="cartItems"></div>
        <div class="cart-footer">
            <div class="cart-total"><span>Totaal:</span> <span id="cartTotalPrice">€ 0,00</span></div>
            <button class="btn-checkout" onclick="checkoutOrder()">Bestel via Snap</button>
        </div>
    </div>

    <div class="spotlight"></div>
    <div class="watermark-container">
        <div class="logo-wrapper">
            <div class="sparkle s1"></div>
            <div class="sparkle s2"></div>
            <div class="sparkle s3"></div>
            <div class="sparkle s4"></div>
            <div class="logo-text">RJ</div>
        </div>
    </div>

    <header class="hero">
        <div class="hero-content"><h1>Iced Out</h1></div>
        <div class="scroll-indicator">Ontdek Collectie<div class="scroll-line"></div></div>
    </header>

    <section id="shop" class="products">
        <h2>Collectie</h2>
        
        <div class="search-container">
            <input type="text" id="searchInput" onkeyup="filterProducts()" placeholder="Zoek een product...">
        </div>

        <div class="grid" id="productGrid">
            <p style="text-align: center; width: 100%; color: #c77dff; font-family: 'Cinzel', serif; z-index: 10; position: relative;">Collectie inladen uit database...</p>
        </div>
    </section>

    <script>
        window.addEventListener('load', function() {
            setTimeout(() => document.getElementById('preloader').classList.add('hidden'), 800); 
        });

        document.addEventListener('mousemove', function(e) {
            document.documentElement.style.setProperty('--mouse-x', e.clientX + 'px');
            document.documentElement.style.setProperty('--mouse-y', e.clientY + 'px');
        });

        const tsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ1zpe-KcRZkdhq4_v-whSgAheKi6VWQMOgfKPgsj1IRXfBQ6MVzWcroxtCymYRRy5FULKcUbYMaTfX/pub?output=tsv";

        fetch(tsvUrl)
        .then(response => response.text())
        .then(data => {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";
            
            const rows = data.split('\n');
            let count = 0;

            for (let i = 1; i < rows.length; i++) {
                const row = rows[i].trim();
                if (!row) continue;

                const cols = row.split('\t');
                if (cols.length < 3) continue;

                const naam = cols[0];
                const prijs = parseFloat(cols[1].replace(',', '.'));
                const foto = cols[2];
                const badge = cols[3] ? cols[3].trim() : "GEEN";

                count++;

                let isSoldOutClass = badge === "UITVERKOCHT" ? "is-sold-out" : "";
                let badgeHTML = "";
                if (badge && badge !== "GEEN") {
                    let badgeClass = badge === "UITVERKOCHT" ? "sold-out" : "";
                    badgeHTML = `<span class="product-badge ${badgeClass}">${badge}</span>`;
                }
                
                let buttonHTML = "";
                if (badge === "UITVERKOCHT") {
                    buttonHTML = `<button class="btn-add disabled" disabled>Uitverkocht</button>`;
                } else {
                    buttonHTML = `<button class="btn-add" onclick="addToCart('${naam.replace(/'/g, "\\'")}', ${prijs})">+ Winkelmand</button>`;
                }

                // HIER ZIT NU DE MAGIE IN DE HTML OPBOUW! 
                grid.innerHTML += `
                    <div class="product-card ${isSoldOutClass}" onmousemove="tiltCard(event, this)" onmouseleave="resetCard(this)">
                        
                        <!-- De Draaiende Laser Straal -->
                        <div class="beam-wrapper">
                            <div class="beam"></div>
                            <div class="beam-inner"></div>
                        </div>

                        <!-- De 3D Content -->
                        ${badgeHTML}
                        <div class="img-container">
                            <img src="${foto}" alt="Product" class="product-image">
                        </div>
                        <div class="product-title">${naam}</div>
                        <div class="product-price">€ ${prijs.toFixed(2).replace('.', ',')}</div>
                        <div class="button-group">
                            <button class="btn-details" onclick="showDetails()">Details</button>
                            ${buttonHTML}
                        </div>

                    </div>
                `;
            }

            if(count === 0) {
                grid.innerHTML = '<p style="text-align: center; width: 100%; position: relative; z-index: 10;">De collectie is momenteel leeg. Voeg producten toe in Google Sheets!</p>';
            }
        })
        .catch(error => {
            document.getElementById('productGrid').innerHTML = '<p style="text-align: center; width: 100%; color: red; position: relative; z-index: 10;">Fout bij ophalen. Check of je Google Sheet is gepubliceerd.</p>';
        });

        // 3D EFFECT FUNCTIES
        function tiltCard(e, card) {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            const rotateX = ((y - centerY) / centerY) * -15; 
            const rotateY = ((x - centerX) / centerX) * 15;

            card.style.transition = 'transform 0.1s ease, box-shadow 0.1s ease';
            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.05, 1.05, 1.05)`;
            card.style.boxShadow = '-10px 20px 40px rgba(0,0,0,0.9)';
            card.style.zIndex = '15';
        }

        function resetCard(card) {
            card.style.transition = 'transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.6s ease';
            card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
            card.style.boxShadow = 'none';
            card.style.zIndex = '1';
        }

        function filterProducts() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('product-card');
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getElementsByClassName('product-title')[0].innerText.toLowerCase();
                cards[i].style.display = title.includes(input) ? "flex" : "none";
            }
        }

        function showDetails() { alert("Binnenkort beschikbaar: Meer foto's!"); }

        let cart = [];
        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('active');
            document.getElementById('cartOverlay').classList.toggle('active');
            document.body.style.overflow = document.getElementById('cartSidebar').classList.contains('active') ? 'hidden' : '';
        }

        function addToCart(name, price) {
            cart.push({name: name, price: price});
            updateCart();
            if (!document.getElementById('cartSidebar').classList.contains('active')) toggleCart();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function updateCart() {
            const cartItemsContainer = document.getElementById('cartItems');
            const cartCount = document.getElementById('cartCount');
            const cartTotal = document.getElementById('cartTotalPrice');
            
            cartCount.innerText = cart.length;
            cartItemsContainer.innerHTML = '';
            let total = 0;
            
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p style="text-align:center; opacity: 0.5; margin-top: 50px;">Je winkelmand is leeg.</p>';
            } else {
                cart.forEach((item, index) => {
                    total += item.price;
                    cartItemsContainer.innerHTML += `
                        <div class="cart-item">
                            <div class="item-name">${item.name}</div>
                            <div>€ ${item.price.toFixed(2).replace('.', ',')} <span class="remove-item" onclick="removeFromCart(${index})">✕</span></div>
                        </div>
                    `;
                });
            }
            cartTotal.innerText = '€ ' + total.toFixed(2).replace('.', ',');
        }

        function checkoutOrder() {
            if (cart.length === 0) return alert("Voeg eerst producten toe aan je winkelmand!");
            let orderText = "Yo RJ, ik wil het volgende bestellen via je site:\n\n";
            let total = 0;
            cart.forEach(item => {
                orderText += `- ${item.name} (€${item.price.toFixed(2).replace('.', ',')})\n`;
                total += item.price;
            });
            orderText += `\nTotaal bedrag: €${total.toFixed(2).replace('.', ',')}\n\nHeb je deze nog op voorraad?`;
            
            navigator.clipboard.writeText(orderText).then(() => {
                alert("✅ Je bestelling is gekopieerd!\n\nJe wordt nu doorgestuurd naar Snapchat. Plak het bericht direct in de chat bij RJ.");
                window.open("https://www.snapchat.com/add/RJ.0708", "_blank");
            }).catch(() => {
                window.open("https://www.snapchat.com/add/RJ.0708", "_blank");
            });
        }
    </script>
</body>
</html>
