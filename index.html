<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RJ Luxe - Collectie</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --mouse-x: 50vw;
            --mouse-y: 50vh;
            --accent: #c77dff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            font-family: 'Playfair Display', serif;
            background-color: #08020b;
            color: #ece4f2;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- CUSTOM SCROLLBAR --- */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #08020b; }
        ::-webkit-scrollbar-thumb { background: rgba(199, 125, 255, 0.4); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(199, 125, 255, 0.8); }

        /* --- PRELOADER (LAADSCHERM) --- */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #050108; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.8s ease-out, visibility 0.8s ease-out;
        }
        #preloader.hidden { opacity: 0; visibility: hidden; }

        .preloader-logo {
            font-family: 'Great Vibes', cursive; font-size: 6rem;
            color: transparent; -webkit-text-stroke: 2px #d09cf5;
            text-shadow: 0 0 20px #c77dff, 0 0 40px #9d4edd;
            animation: pulse-glow 1.5s infinite alternate ease-in-out;
        }

        @keyframes pulse-glow {
            0% { transform: scale(0.9); opacity: 0.7; text-shadow: 0 0 10px #c77dff; }
            100% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 30px #c77dff, 0 0 60px #9d4edd; }
        }

        /* --- DE INTERACTIEVE SPOTLIGHT --- */
        .spotlight {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 0;
            background: radial-gradient(800px circle at var(--mouse-x) var(--mouse-y), rgba(176, 82, 255, 0.15) 0%, rgba(74, 20, 140, 0.05) 40%, transparent 80%);
        }

        /* --- HET LOGO WATERMERK --- */
        .watermark-container {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 1; pointer-events: none; display: flex; justify-content: center;
            align-items: center; width: 100vw; opacity: 0.95; 
            filter: drop-shadow(1px 1px 0px #9d4edd) drop-shadow(3px 3px 0px #7b2cbf) drop-shadow(5px 5px 0px #5a189a) drop-shadow(7px 7px 0px #3c096c) drop-shadow(0px 15px 30px rgba(0,0,0,0.9));
        }

        .logo-wrapper { position: relative; display: inline-block; filter: drop-shadow(0 0 8px rgba(224, 170, 255, 0.4)) drop-shadow(0 0 15px rgba(199, 125, 255, 0.2)); }

        .logo-text {
            font-family: 'Great Vibes', cursive; font-size: 35vw; line-height: 1.4; 
            padding: 10vw 15vw; margin: -10vw -15vw; letter-spacing: -3vw; 
            -webkit-text-stroke: 3px #d09cf5; 
            background: linear-gradient(115deg, transparent 45%, rgba(255,255,255,0.9) 50%, transparent 55%), conic-gradient(from 45deg at 50% 50%, rgba(255,255,255,0.9) 0deg, rgba(200,210,220,0.3) 45deg, rgba(255,255,255,0.8) 90deg, rgba(180,195,210,0.5) 135deg, rgba(255,255,255,0.9) 180deg, rgba(200,210,220,0.3) 225deg, rgba(255,255,255,0.8) 270deg, rgba(180,195,210,0.5) 315deg), conic-gradient(from 15deg at 25% 25%, #ffffff 0deg, #c4d4db 90deg, #ffffff 180deg, #8ba8b5 270deg), linear-gradient(135deg, #e0eff2 0%, #ffffff 30%, #b8ced1 50%, #ffffff 70%, #e0eff2 100%);
            background-size: 200% 100%, 14px 14px, 22px 22px, 100% 100%; background-position: -200% 0, 0 0, 0 0, 0 0; 
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent;
            animation: occasional-reflection 8s infinite ease-in-out;
        }

        /* --- NAVIGATIE --- */
        nav { position: fixed; top: 0; right: 0; padding: 40px 60px; z-index: 1000; }
        .contact-trigger { font-family: 'Cinzel', serif; color: #ffffff; text-decoration: none; font-size: 1rem; letter-spacing: 3px; text-transform: uppercase; font-weight: 600; opacity: 0.7; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .contact-trigger:hover { opacity: 1; color: var(--accent); letter-spacing: 5px; }

        /* --- HERO --- */
        .hero { height: 100vh; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; z-index: 10; }
        .hero h1 { font-family: 'Cinzel', serif; font-size: 3.5rem; letter-spacing: 12px; text-transform: uppercase; font-weight: 600; opacity: 0.95; text-shadow: 0 5px 15px rgba(0,0,0,0.9); margin-bottom: 60px; }
        .scroll-indicator { display: flex; flex-direction: column; align-items: center; color: var(--accent); font-size: 0.85rem; letter-spacing: 3px; text-transform: uppercase; opacity: 0.8; animation: pulse 2s infinite ease-in-out; position: absolute; bottom: 50px; }
        .scroll-line { width: 1px; height: 50px; background-color: var(--accent); margin-top: 15px; }
        @keyframes pulse { 0% { opacity: 0.4; transform: translateY(0); } 50% { opacity: 1; transform: translateY(8px); } 100% { opacity: 0.4; transform: translateY(0); } }

        /* --- PRODUCTEN --- */
        .products { padding: 100px 50px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 10; }
        .products h2 { font-family: 'Cinzel', serif; text-align: center; font-size: 2.2rem; letter-spacing: 5px; margin-bottom: 30px; color: #ffffff; font-weight: 400; text-transform: uppercase; }

        /* --- ZOEKBALK --- */
        .search-container { text-align: center; margin-bottom: 50px; }
        #searchInput { width: 80%; max-width: 400px; padding: 12px 25px; font-family: 'Cinzel', serif; font-size: 1rem; color: #ffffff; background: rgba(20, 8, 30, 0.6); border: 1px solid rgba(199, 125, 255, 0.3); border-radius: 25px; outline: none; transition: all 0.3s ease; backdrop-filter: blur(5px); }
        #searchInput::placeholder { color: rgba(255, 255, 255, 0.5); letter-spacing: 2px; text-transform: uppercase; font-size: 0.85rem; }
        #searchInput:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(199, 125, 255, 0.3); background: rgba(20, 8, 30, 0.9); }

        /* --- PRODUCT GRID & 3D TILT BASIS --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; perspective: 1000px; }
        
        .product-card { 
            background-color: rgba(13, 4, 18, 0.85); border: 1px solid rgba(199, 125, 255, 0.15); border-radius: 4px; 
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center; 
            font-family: 'Cinzel', serif; letter-spacing: 2px; color: #a37bc7; 
            backdrop-filter: blur(8px); padding: 20px; text-align: center; height: 100%; position: relative; overflow: hidden;
            
            /* SCROLL FADE & FLOAT SETTINGS */
            opacity: 0;
            transform: translateY(60px);
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            transform-style: preserve-3d;
        }

        .product-card.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .product-card::before { content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, transparent, rgba(255,255,255,0.08), transparent); transform: skewX(-25deg); transition: 0.75s; pointer-events: none; z-index: 1; }
        .product-card:hover::before { left: 125%; }

        .img-container { width: 100%; height: 250px; border-radius: 4px; overflow: hidden; margin-bottom: 20px; background-color: #1a0b26; transform: translateZ(20px); }
        .product-image { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        .product-card:hover .product-image { transform: scale(1.1); }

        .product-title { margin-bottom: 15px; font-weight: 600; font-size: 1.2rem; position: relative; z-index: 2; transform: translateZ(30px); }
        .product-price { color: #ffffff; font-size: 1.1rem; margin-bottom: 25px; letter-spacing: 1px; position: relative; z-index: 2; transform: translateZ(20px); }
        
        /* --- DUBBELE KNOPPEN --- */
        .button-group { display: flex; gap: 10px; width: 100%; margin-top: auto; position: relative; z-index: 2; transform: translateZ(40px); }
        .btn-details, .btn-add { flex: 1; font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; padding: 10px 5px; border-radius: 3px; border: 1px solid var(--accent); }
        .btn-details { background-color: transparent; color: var(--accent); }
        .btn-details:hover { background-color: rgba(199, 125, 255, 0.2); color: #fff; }
        .btn-add { background-color: var(--accent); color: #08020b; font-weight: bold; }
        .btn-add:hover { box-shadow: 0 0 15px rgba(199, 125, 255, 0.5); }

        /* --- ZWEVENDE WINKELMAND ICOON --- */
        #cartIcon {
            position: fixed; bottom: 30px; right: 30px; background: var(--accent); color: #08020b;
            width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem; cursor: pointer; z-index: 1500; box-shadow: 0 5px 20px rgba(199, 125, 255, 0.4);
            transition: 0.3s;
        }
        #cartIcon:hover { transform: scale(1.1); }
        #cartCount {
            position: absolute; top: -5px; right: -5px; background: #fff; color: #000; font-family: sans-serif;
            font-size: 0.8rem; width: 22px; height: 22px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; border: 2px solid #08020b;
        }

        /* --- WINKELMAND SIDEBAR MENU --- */
        #cartSidebar {
            position: fixed; top: 0; right: -400px; width: 400px; max-width: 100vw; height: 100vh;
            background: rgba(13, 4, 18, 0.98); backdrop-filter: blur(20px); z-index: 2500;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid rgba(199, 125, 255, 0.2);
            display: flex; flex-direction: column; font-family: 'Cinzel', serif;
        }
        #cartSidebar.active { right: 0; }
        .cart-header { padding: 30px; border-bottom: 1px solid rgba(199, 125, 255, 0.2); display: flex; justify-content: space-between; align-items: center; }
        .cart-header h3 { color: var(--accent); letter-spacing: 3px; margin: 0; }
        .close-cart { font-size: 2rem; cursor: pointer; color: #fff; transition: 0.3s; line-height: 1; }
        .close-cart:hover { color: var(--accent); }
        
        #cartItems { flex: 1; overflow-y: auto; padding: 20px 30px; color: #fff; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; font-size: 0.9rem; align-items: center; letter-spacing: 1px;}
        .remove-item { color: #ff4d4d; cursor: pointer; margin-left: 15px; font-family: sans-serif; font-weight: bold; padding: 5px; }
        
        .cart-footer { padding: 30px; border-top: 1px solid rgba(199, 125, 255, 0.2); background: rgba(8, 2, 11, 0.9); }
        .cart-total { font-size: 1.2rem; margin-bottom: 20px; display: flex; justify-content: space-between; font-weight: bold; color: #fff; letter-spacing: 2px;}
        .btn-checkout { width: 100%; background: #FFFC00; color: #000; padding: 15px; border: none; font-weight: bold; font-size: 1rem; border-radius: 5px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; font-family: sans-serif;}
        .btn-checkout:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(255, 252, 0, 0.4); }

        /* --- MOBIEL --- */
        @media (max-width: 768px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .product-card { padding: 10px; height: auto; }
            .img-container { height: 160px; margin-bottom: 10px; }
            .product-title { font-size: 0.75rem; margin-bottom: 5px; letter-spacing: 1px; }
            .product-price { font-size: 0.85rem; margin-bottom: 15px; }
            .button-group { flex-direction: column; gap: 5px; }
            .btn-details, .btn-add { font-size: 0.65rem; padding: 8px 5px; }
            .products { padding: 50px 20px; }
            #searchInput { width: 90%; }
            .hero h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <!-- PRELOADER -->
    <div id="preloader">
        <div class="preloader-logo">RJ</div>
    </div>

    <!-- ZWEVENDE WINKELMAND KNOP -->
    <div id="cartIcon" onclick="toggleCart()">
        🛒 <span id="cartCount">0</span>
    </div>

    <!-- WINKELMAND SIDEBAR -->
    <div id="cartSidebar">
        <div class="cart-header">
            <h3>Winkelmand</h3>
            <span class="close-cart" onclick="toggleCart()">×</span>
        </div>
        <div id="cartItems">
            <!-- Items komen hier -->
        </div>
        <div class="cart-footer">
            <div class="cart-total"><span>Totaal:</span> <span id="cartTotalPrice">€ 0,00</span></div>
            <button class="btn-checkout" onclick="checkoutOrder()">Bestel via Snap</button>
        </div>
    </div>

    <div class="spotlight"></div>

    <div class="watermark-container">
        <div class="logo-wrapper">
            <div class="sparkle s1"></div>
            <div class="sparkle s2"></div>
            <div class="sparkle s3"></div>
            <div class="sparkle s4"></div>
            <div class="logo-text">RJ</div>
        </div>
    </div>

    <header class="hero">
        <div class="hero-content">
            <h1>Iced Out</h1>
        </div>
        <div class="scroll-indicator">
            Ontdek Collectie
            <div class="scroll-line"></div>
        </div>
    </header>

    <section id="shop" class="products">
        <h2>Collectie</h2>
        
        <div class="search-container">
            <input type="text" id="searchInput" onkeyup="filterProducts()" placeholder="Zoek een product...">
        </div>

        <div class="grid" id="productGrid">
            
            <div class="product-card">
                <div class="img-container">
                    <img src="https://i.postimg.cc/VvMfH8Vs/IMG-E0905.avif" alt="Product Foto" class="product-image">
                </div>
                <div class="product-title">Goyard Grey slingbag</div>
                <div class="product-price">€ 39,95</div>
                <div class="button-group">
                    <button class="btn-details" onclick="showDetails()">Details</button>
                    <button class="btn-add" onclick="addToCart('Goyard Grey slingbag', 39.95)">+ Winkelmand</button>
                </div>
            </div>
            
            <div class="product-card">
                <div class="img-container">
                    <img src="https://i.postimg.cc/WpKqWph1/IMG-E0909.avif" alt="Product Foto" class="product-image">
                </div>
                <div class="product-title">Louis Vuitton blue flame bag</div>
                <div class="product-price">€ 39,95</div>
                <div class="button-group">
                    <button class="btn-details" onclick="showDetails()">Details</button>
                    <button class="btn-add" onclick="addToCart('LV blue flame bag', 39.95)">+ Winkelmand</button>
                </div>
            </div>
            
            <div class="product-card">
                <div class="img-container">
                    <img src="https://i.postimg.cc/tJC0FHHg/IMG-E0912.avif" class="product-image">
                </div>
                <div class="product-title">Goyard Green/Grey cardholder</div>
                <div class="product-price">€ 19,95</div>
                <div class="button-group">
                    <button class="btn-details" onclick="showDetails()">Details</button>
                    <button class="btn-add" onclick="addToCart('Goyard Green/Grey cardholder', 19.95)">+ Winkelmand</button>
                </div>
            </div>
            
            <div class="product-card">
                <div class="img-container">
                    <img src="https://i.postimg.cc/Tw3Q92hC/IMG-0910.jpg" class="product-image">
                </div>
                <div class="product-title">Dior Silver 925 chain</div>
                <div class="product-price">€ 19,95</div>
                <div class="button-group">
                    <button class="btn-details" onclick="showDetails()">Details</button>
                    <button class="btn-add" onclick="addToCart('Dior Silver 925 chain', 19.95)">+ Winkelmand</button>
                </div>
            </div>
            
            <div class="product-card">
                <div class="img-container">
                    <img src="https://i.postimg.cc/sxVcXjCJ/IMG-E0914.avif" class="product-image">
                </div>
                <div class="product-title">Louis Vuitton black belt 110cm</div>
                <div class="product-price">€ 24,95</div>
                <div class="button-group">
                    <button class="btn-details" onclick="showDetails()">Details</button>
                    <button class="btn-add" onclick="addToCart('LV black belt 110cm', 24.95)">+ Winkelmand</button>
                </div>
            </div>
            
            <div class="product-card">
                <div class="img-container">
                    <img src="https://i.postimg.cc/vmrf6Jzj/IMG-E0915.avif" alt="Product Foto" class="product-image">
                </div>
                <div class="product-title">Louis Vuitton brown belt 110cm</div>
                <div class="product-price">€ 24,95</div>
                <div class="button-group">
                    <button class="btn-details" onclick="showDetails()">Details</button>
                    <button class="btn-add" onclick="addToCart('LV brown belt 110cm', 24.95)">+ Winkelmand</button>
                </div>
            </div>

        </div>
    </section>

    <script>
        // 1. PRELOADER
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('preloader').classList.add('hidden');
            }, 1200); 
        });

        // 2. SPOTLIGHT
        document.addEventListener('mousemove', function(e) {
            document.documentElement.style.setProperty('--mouse-x', e.clientX + 'px');
            document.documentElement.style.setProperty('--mouse-y', e.clientY + 'px');
        });

        // 3. SCROLL FADE & FLOAT
        document.addEventListener("DOMContentLoaded", () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });

            // 4. 3D TILT EFFECT & SCROLL OBSERVE
            const tiltCards = document.querySelectorAll('.product-card');
            tiltCards.forEach(card => {
                observer.observe(card); // Voeg toe aan scroll animatie
                
                card.addEventListener('mousemove', e => {
                    let rect = card.getBoundingClientRect();
                    let x = e.clientX - rect.left;
                    let y = e.clientY - rect.top;
                    
                    let xPct = (x / rect.width - 0.5) * 15; 
                    let yPct = (y / rect.height - 0.5) * -15;
                    
                    card.style.transition = 'none'; // Zorgt dat de 3D direct je muis volgt
                    card.style.transform = `perspective(1000px) rotateY(${xPct}deg) rotateX(${yPct}deg) scale3d(1.02, 1.02, 1.02)`;
                    card.style.boxShadow = `${-xPct}px ${yPct}px 20px rgba(199, 125, 255, 0.3)`;
                });
                
                card.addEventListener('mouseleave', () => {
                    card.style.transition = 'transform 0.5s ease, box-shadow 0.5s ease';
                    card.style.transform = `perspective(1000px) rotateY(0deg) rotateX(0deg) scale3d(1, 1, 1)`;
                    card.style.boxShadow = 'none';
                });
            });
        });

        // 5. ZOEKEN
        function filterProducts() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('product-card');

            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getElementsByClassName('product-title')[0].innerText.toLowerCase();
                if (title.includes(input)) {
                    cards[i].style.display = "flex"; 
                } else {
                    cards[i].style.display = "none"; 
                }
            }
        }

        function showDetails() {
            alert("Binnenkort beschikbaar: Meer foto's en details van dit specifieke product!");
        }

        // 6. WINKELMAND SYSTEEM
        let cart = [];

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('active');
        }

        function addToCart(name, price) {
            cart.push({name: name, price: price});
            updateCart();
            document.getElementById('cartSidebar').classList.add('active');
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function updateCart() {
            const cartItemsContainer = document.getElementById('cartItems');
            const cartCount = document.getElementById('cartCount');
            const cartTotal = document.getElementById('cartTotalPrice');
            
            cartCount.innerText = cart.length;
            cartItemsContainer.innerHTML = '';
            let total = 0;
            
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p style="text-align:center; opacity: 0.5; margin-top: 50px;">Je winkelmand is nog leeg.</p>';
            } else {
                cart.forEach((item, index) => {
                    total += item.price;
                    cartItemsContainer.innerHTML += `
                        <div class="cart-item">
                            <div>${item.name}</div>
                            <div>
                                € ${item.price.toFixed(2).replace('.', ',')} 
                                <span class="remove-item" onclick="removeFromCart(${index})">X</span>
                            </div>
                        </div>
                    `;
                });
            }
            cartTotal.innerText = '€ ' + total.toFixed(2).replace('.', ',');
        }

        function checkoutOrder() {
            if (cart.length === 0) {
                alert("Voeg eerst producten toe aan je winkelmand!");
                return;
            }
            
            let orderText = "Yo RJ, ik wil het volgende bestellen via je site:\n\n";
            let total = 0;
            
            cart.forEach(item => {
                orderText += `- ${item.name} (€${item.price.toFixed(2).replace('.', ',')})\n`;
                total += item.price;
            });
            
            orderText += `\nTotaal bedrag: €${total.toFixed(2).replace('.', ',')}\n\nHeb je deze nog op voorraad?`;
            
            navigator.clipboard.writeText(orderText).then(() => {
                alert("✅ Je bestelling is gekopieerd!\n\nJe wordt nu doorgestuurd naar Snapchat. Plak het gekopieerde lijstje direct in de chat bij RJ.");
                window.open("https://www.snapchat.com/add/RJ.0708", "_blank");
            }).catch(err => {
                alert("Stuur dit lijstje naar RJ.0708 op Snapchat:\n\n" + orderText);
                window.open("https://www.snapchat.com/add/RJ.0708", "_blank");
            });
        }
        
        updateCart();
    </script>

</body>
</html>
